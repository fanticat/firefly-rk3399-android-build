name: Build Firefly RK3399 Custom U-Boot

on:
  workflow_dispatch:
  push:
    paths:
      - 'patches/uboot/**'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu device-tree-compiler bison flex libssl-dev bc python2 python3
          pip3 install pyelftools==0.27

      - name: Clone Vicharak U-Boot
        run: |
          git clone --depth 1 --single-branch --branch master https://github.com/vicharak-in/rockchip-linux-u-boot.git uboot

      - name: Apply Firefly board patches
        run: |
          cd uboot

          # Copy Firefly DTS, DTSI, and defconfig
          cp ../patches/uboot/rk3399-firefly-android.dts arch/arm/dts/
          cp ../patches/uboot/rk3399-firefly-u-boot.dtsi arch/arm/dts/
          cp ../patches/uboot/rk3399-firefly-android_defconfig configs/

          # Add our DTB to the Makefile
          if grep -q 'rk3399-firefly-android\.dtb' arch/arm/dts/Makefile; then
            echo "DTB entry already exists"
          else
            sed -i '/rk3399-firefly\.dtb/a\\trk3399-firefly-android.dtb \\' arch/arm/dts/Makefile
          fi

          # Copy Vaaman board code (ADC recovery key + LED support - same for Firefly)
          # The board code uses SARADC ch1 which matches Firefly hardware
          mkdir -p board/vicharak/rk3399_firefly
          cp board/vicharak/rk3399_vaaman/rk3399_vaaman.c board/vicharak/rk3399_firefly/rk3399_firefly.c
          cp board/vicharak/rk3399_vaaman/Makefile board/vicharak/rk3399_firefly/

          # Create Kconfig for the new board target
          cat > board/vicharak/rk3399_firefly/Kconfig << 'KCFG'
          if TARGET_RK3399_FIREFLY

          config SYS_BOARD
                  default "rk3399_firefly"

          config SYS_VENDOR
                  default "vicharak"

          config SYS_CONFIG_NAME
                  default "rk3399_firefly"

          config BOARD_SPECIFIC_OPTIONS
                  def_bool y

          endif
          KCFG

          # Add board target to arch/arm/mach-rockchip/rk3399/Kconfig
          sed -i '/source "board\/vicharak\/rk3399_vaaman\/Kconfig"/a\\nconfig TARGET_RK3399_FIREFLY\n\tbool "Firefly RK3399 board"\n\thelp\n\t  Firefly-RK3399 board with Android 12 support.\n\nsource "board/vicharak/rk3399_firefly/Kconfig"' arch/arm/mach-rockchip/rk3399/Kconfig

          # Create board header
          cat > include/configs/rk3399_firefly.h << 'HDR'
          /* SPDX-License-Identifier: GPL-2.0+ */
          #ifndef __RK3399_FIREFLY_H
          #define __RK3399_FIREFLY_H

          #include <configs/rk3399_common.h>

          #define ROCKCHIP_DEVICE_SETTINGS \
                  "stdin=serial,usbkbd\0" \
                  "stdout=serial,vidconsole\0" \
                  "stderr=serial,vidconsole\0"

          #ifndef CONFIG_SPL_BUILD
          #undef CONFIG_BOOTCOMMAND
          #define CONFIG_BOOTCOMMAND RKIMG_BOOTCOMMAND
          #endif

          #define CONFIG_MMC_SDHCI_SDMA
          #define CONFIG_SYS_MMC_ENV_DEV 0
          #define CONFIG_SYS_MMC_MAX_BLK_COUNT 32768

          #define CONFIG_MISC_INIT_R
          #define CONFIG_SERIAL_TAG
          #define CONFIG_ENV_OVERWRITE

          #define CONFIG_BMP_16BPP
          #define CONFIG_BMP_24BPP
          #define CONFIG_BMP_32BPP

          #endif
          HDR

      - name: Build U-Boot
        run: |
          cd uboot
          export CROSS_COMPILE=aarch64-linux-gnu-

          ./make.sh rk3399-firefly-android

      - name: Verify outputs
        run: |
          cd uboot
          echo "=== Build outputs ==="
          ls -la uboot.img trust.img idbloader.img 2>/dev/null || echo "Standard images not found"
          ls -la *loader*.bin *download*.bin 2>/dev/null || echo "No loader binaries"

          mkdir -p output
          cp uboot.img output/ 2>/dev/null || true
          cp trust.img output/ 2>/dev/null || true
          cp idbloader.img output/ 2>/dev/null || true
          cp rk3399_loader_*.bin output/ 2>/dev/null || true
          cp *download*.bin output/ 2>/dev/null || true

          echo "=== Output files ==="
          ls -la output/

      - name: Upload U-Boot images
        uses: actions/upload-artifact@v4
        with:
          name: firefly-rk3399-uboot
          path: uboot/output/
          retention-days: 30
