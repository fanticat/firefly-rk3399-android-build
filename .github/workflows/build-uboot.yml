name: Build Firefly RK3399 Custom U-Boot

on:
  workflow_dispatch:
  push:
    paths:
      - 'patches/uboot/**'
      - '.github/workflows/build-uboot.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu device-tree-compiler bison flex libssl-dev bc python2 python3
          pip3 install pyelftools==0.27

      - name: Clone Vicharak U-Boot
        run: |
          git clone --depth 1 --single-branch --branch master https://github.com/vicharak-in/rockchip-linux-u-boot.git uboot

      - name: Apply Firefly patches
        run: |
          cd uboot

          # Copy Firefly DTS, DTSI, and defconfig
          cp ../patches/uboot/rk3399-firefly-android.dts arch/arm/dts/
          cp ../patches/uboot/rk3399-firefly-u-boot.dtsi arch/arm/dts/
          cp ../patches/uboot/rk3399-firefly-android_defconfig configs/

          # Add our DTB to the Makefile (after the existing firefly entry)
          if grep -q 'rk3399-firefly-android\.dtb' arch/arm/dts/Makefile; then
            echo "DTB entry already exists"
          else
            sed -i '/rk3399-firefly\.dtb/a\\trk3399-firefly-android.dtb \\' arch/arm/dts/Makefile
          fi

          # Patch: if external DTB can't be loaded from eMMC, fall back to
          # U-Boot's built-in DTB. This is needed because the Vaaman firmware
          # doesn't have a filesystem partition with our DTB file.
          patch -p1 < ../patches/uboot/fix-dtb-loading.patch

      - name: Verify Kconfig and board setup
        run: |
          cd uboot
          echo "=== defconfig DT ==="
          grep "DEFAULT_DEVICE_TREE\|EARLY_DISTRO_DTB" configs/rk3399-firefly-android_defconfig
          echo "=== DTS files ==="
          ls -la arch/arm/dts/rk3399-firefly-android.dts arch/arm/dts/rk3399-firefly-u-boot.dtsi
          echo "=== Board dir ==="
          ls -la board/vicharak/rk3399_vaaman/
          echo "=== Vendor common ==="
          ls -la board/vicharak/common/

      - name: Build U-Boot
        run: |
          cd uboot
          export CROSS_COMPILE=aarch64-linux-gnu-

          ./make.sh rk3399-firefly-android

      - name: Verify outputs
        run: |
          cd uboot
          echo "=== Build outputs ==="
          ls -la uboot.img trust.img idbloader.img 2>/dev/null || echo "Standard images not found"
          ls -la *loader*.bin *download*.bin 2>/dev/null || echo "No loader binaries"

          mkdir -p output
          cp uboot.img output/ 2>/dev/null || true
          cp trust.img output/ 2>/dev/null || true
          cp idbloader.img output/ 2>/dev/null || true
          cp rk3399_loader_*.bin output/ 2>/dev/null || true
          cp *download*.bin output/ 2>/dev/null || true

          echo "=== Output files ==="
          ls -la output/

      - name: Upload U-Boot images
        uses: actions/upload-artifact@v4
        with:
          name: firefly-rk3399-uboot
          path: uboot/output/
          retention-days: 30
